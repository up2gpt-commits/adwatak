<!DOCTYPE html>
<html dir="rtl">
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    width: 1200px; 
    height: 630px; 
    overflow: hidden;
  }
  .og {
    width: 1200px;
    height: 630px;
    background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
  }
  .bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 8px;
    background: linear-gradient(90deg, #2563eb, #7c3aed, #2563eb);
  }
  .circle1 {
    position: absolute;
    top: -120px;
    left: -80px;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: rgba(37, 99, 235, 0.08);
  }
  .circle2 {
    position: absolute;
    bottom: -150px;
    right: -100px;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: rgba(124, 58, 237, 0.06);
  }
  .icon {
    font-size: 72px;
    margin-bottom: 16px;
    position: relative;
    z-index: 1;
  }
  .brand {
    font-size: 64px;
    font-weight: 900;
    color: #ffffff;
    text-align: center;
    line-height: 1.15;
    margin-bottom: 12px;
    letter-spacing: 0.02em;
    position: relative;
    z-index: 1;
  }
  .desc {
    font-size: 28px;
    color: #94a3b8;
    text-align: center;
    line-height: 1.4;
    margin-bottom: 8px;
    position: relative;
    z-index: 1;
  }
  .sub {
    font-size: 20px;
    color: #64748b;
    text-align: center;
    line-height: 1.4;
    position: relative;
    z-index: 1;
  }
  .url {
    position: absolute;
    bottom: 28px;
    font-size: 16px;
    color: #334155;
    z-index: 1;
  }
</style>
</head>
<body>
<div class="og">
  <div class="bar"></div>
  <div class="circle1"></div>
  <div class="circle2"></div>
  <div class="icon">🔧</div>
  <div class="brand">أدواتك</div>
  <div class="desc">80+ أداة مجانية بالعربي</div>
  <div class="sub">حاسبات • أدوات إسلامية • مولدات • محولات</div>
  <div class="url">adwatak.cloud</div>
</div>
</body>
</html>
